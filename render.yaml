# Render 部署配置

services:
  - type: web
    name: webscrape-api
    runtime: python
    plan: free
    
    # 构建配置
    buildCommand: pip install -r requirements.txt
    
    # 启动命令
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    
    # 环境变量
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "false"
      - key: MASTER_API_KEY
        generateValue: true
    
    # 健康检查
    healthCheckPath: /api/health
    
    # 自动部署
    autoDeploy: true
